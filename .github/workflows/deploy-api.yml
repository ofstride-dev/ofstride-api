name: Deploy API to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create deployment package
      run: |
        pwd
        ls -la
        zip -r app.zip . -x ".git/*" ".github/*" "__pycache__/*" "*.pyc" ".env" ".gitignore" ".pytest_cache/*" "venv/*"
        ls -lah app.zip
        file app.zip
    
    - name: Deploy to Azure using Kudu
      env:
        USERNAME: ${{ secrets.AZURE_DEPLOY_USERNAME }}
        PASSWORD: ${{ secrets.AZURE_DEPLOY_PASSWORD }}
      run: |
        echo "Deploying to Azure App Service..."
        SITE_URL="was-ofstride-api-001.azurewebsites.net"
        
        curl -X POST \
          --basic -u "$USERNAME:$PASSWORD" \
          -H "Content-Type: application/zip" \
          --data-binary @app.zip \
          "https://$SITE_URL/api/zipdeploy" \
          -v
        
        echo "Deployment sent to Azure"
