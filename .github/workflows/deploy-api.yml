name: Deploy API to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Prepare deployment package
      run: |
        mkdir -p deploy_package
        cp -r . deploy_package/ --no-preserve=mode
        cd deploy_package
        rm -rf .git .github .pytest_cache __pycache__ *.pyc .env .gitignore
        zip -r ../app.zip . -x "*.pyc" "__pycache__/*"
        cd ..
    
    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: was-ofstride-api-001
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_API }}
        package: deploy_package/app.zip
